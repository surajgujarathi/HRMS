name: flutter_app
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+2

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.0
  http: ^1.5.0
  connectivity_plus: ^6.1.0
  shared_preferences: ^2.5.4
  flutter_bloc: ^9.1.1
  bloc: ^9.2.0
  equatable: ^2.0.5
  intl: ^0.20.2
  fl_chart: ^0.66.0
  go_router: ^14.0.0
  animations: ^2.0.11
  flutter_secure_storage: ^10.0.0
  odoo_rpc: ^0.7.1
  geolocator: ^13.0.2
  file_picker: ^8.1.4
  get_it: ^9.2.1
  url_launcher: ^6.3.1
  web_socket_channel: ^3.0.1
  path_provider: ^2.1.5
  open_file: ^3.3.0
  mime: ^2.0.0
  emoji_picker_flutter: ^4.0.0
  flutter_launcher_icons: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  change_app_package_name: ^1.5.0

flutter_native_splash:

  color: "#FFFFFF"

  android: true

  ios: true

  fullscreen: true

  android_12:
    color: "#FFFFFF"
flutter_launcher_icons:

  android: true

  ios: true

  image_path: "assets/images/opsen.png"

  adaptive_icon_background: "#FFFFFF"

  adaptive_icon_foreground: "assets/images/opsen.png"
flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/
